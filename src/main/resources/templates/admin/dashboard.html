<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            background: #f4f6f9;
        }

        .card:hover {
            transform: translateY(-5px);
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .btn {
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div th:replace="~{fragments/navbar :: body}"></div>

<div class="container mt-4">

    <h2>
        <i class="fas fa-tools"></i> Admin Dashboard
    </h2>

    <!-- CREATE BUTTON -->
    <a href="/admin/create-event" class="btn btn-primary mb-3">
        <i class="fas fa-plus"></i> Create Event
    </a>

    <!-- NO EVENTS -->
    <div th:if="${events == null || events.isEmpty()}">
        <p>No events available</p>
    </div>

    <!-- EVENTS GRID -->
    <div class="row">

        <!-- IMPORTANT FIX: using e -->
        <div class="col-md-4 mb-3" th:each="e : ${events}">

            <div class="card p-3 shadow">

                <!-- EVENT NAME -->
                <h5 th:text="${e.eventName}"></h5>

                <!-- DATE -->
                <p>
                    <b>Date:</b>
                    <span th:text="${#temporals.format(e.eventDateTime,'dd MMM yyyy HH:mm')}"></span>
                </p>

                <!-- TICKETS -->
                <p>
                    Tickets:
                    <span th:text="${e.bookedTickets}"></span> /
                    <span th:text="${e.maxTickets}"></span>
                </p>

                <!-- DOMAIN -->
                <p>
                    <b>Allowed:</b>
                    <span th:text="${e.allowedDomain}"></span>
                </p>

                <!-- EDIT BUTTON -->
                <a th:href="@{/admin/edit/{id}(id=${e.id})}"
                   class="btn btn-warning w-100 mb-2">
                    <i class="fas fa-edit"></i> Edit
                </a>

                <!-- DELETE BUTTON -->
                <a th:href="@{/admin/delete/{id}(id=${e.id})}"
                   class="btn btn-danger w-100"
                   onclick="return confirm('Are you sure to delete this event?');">
                    <i class="fas fa-trash"></i> Delete
                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
