<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Create Event</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-light">

<div th:replace="fragments/navbar :: body"></div>

<div class="container mt-4">

<div class="card p-4 shadow">

<h4><i class="fas fa-calendar-plus"></i> Create Event</h4>

<form action="/admin/create-event" method="post">

<input class="form-control mb-2" name="eventName" placeholder="Event Name" required>

<input class="form-control mb-2" type="datetime-local" name="eventDateTime" required>

<input class="form-control mb-2" type="number" name="maxTickets" placeholder="Max Tickets" required>

<select class="form-select mb-2" name="allowedDomain">
<option value="ALL">All Students</option>
<option value="klh.edu.in">@klh.edu.in only</option>
</select>

<button class="btn btn-success w-100">
    <i class="fas fa-save"></i> Create Event
</button>

</form>

</div>

</div>
</body>
</html>
