<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Edit Event</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

<div class="card p-4 shadow">

<h4>Edit Event</h4>

<form action="/admin/update-event" method="post">

<input type="hidden" name="id" th:value="${event.id}"/>

<input class="form-control mb-2" name="eventName" th:value="${event.eventName}" required>

<input class="form-control mb-2" type="datetime-local"
       name="eventDateTime"
       th:value="${#temporals.format(event.eventDateTime,'yyyy-MM-dd''T''HH:mm')}" required>

<input class="form-control mb-2" type="number" name="maxTickets"
       th:value="${event.maxTickets}" required>

<select class="form-select mb-2" name="allowedDomain">
<option value="ALL" th:selected="${event.allowedDomain == 'ALL'}">All Students</option>
<option value="klh.edu.in" th:selected="${event.allowedDomain == 'klh.edu.in'}">
    @klh.edu.in only
</option>
</select>

<button class="btn btn-success w-100">
Update Event
</button>

</form>

</div>

</div>

</body>
</html>
