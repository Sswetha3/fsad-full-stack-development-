<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body { background: linear-gradient(to right, #667eea, #764ba2); }
</style>
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

<div id="loader" style="display:none; position:fixed; width:100%; height:100%; background:white; z-index:9999; text-align:center; padding-top:200px;">
<i class="fas fa-spinner fa-spin fa-3x"></i>
</div>

<div class="card p-4 shadow" style="width:350px;">
<h3 class="text-center"><i class="fas fa-user"></i> Login</h3>

<form action="/auth/login" method="post">
<input class="form-control mb-2" name="email" placeholder="Email">
<input class="form-control mb-3" type="password" name="password" placeholder="Password">

<button class="btn btn-dark w-100"><i class="fas fa-sign-in-alt"></i> Login</button>
</form>

<a href="/register" class="text-center mt-3 d-block">Register</a>
</div>

<script>
document.querySelector("form").addEventListener("submit",()=>{
document.getElementById("loader").style.display="block";
});
</script>

</body>
</html>
