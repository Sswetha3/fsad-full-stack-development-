<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>My Events</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-light">

<div th:replace="~{fragments/navbar :: body}"></div>

<div class="container mt-4">

<h3><i class="fas fa-ticket-alt"></i> My Booked Events</h3>

<div th:if="${tickets.isEmpty()}">
<p>No events booked</p>
</div>

<div class="row">

<div class="col-md-4 mb-3" th:each="t : ${tickets}">
<div class="card p-3 shadow">

<h5 th:text="${t.event.eventName}"></h5>

<p>
<b>Date:</b>
<span th:text="${#temporals.format(t.event.eventDateTime,'dd MMM yyyy HH:mm')}"></span>
</p>

<!-- CANCEL BUTTON -->
<form action="/student/unbook" method="post">

<input type="hidden" name="eventId" th:value="${t.event.id}" />
<input type="hidden" name="userId" th:value="${session.loggedUser.id}" />

<button class="btn btn-danger w-100">
<i class="fas fa-times"></i> Cancel
</button>

</form>

</div>
</div>

</div>

<a href="/student/dashboard" class="btn btn-secondary mt-3">
Back
</a>

</div>

</body>
</html>
